version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: sach-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: 'sach'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sach.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sach-network

networks:
  sach-network:
    driver: bridge

volumes:
  db_data:
